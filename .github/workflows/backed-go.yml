# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go test and build

on:
  push:
    branches: [ "main" ]
    paths:
    - "backend/admin/**"
    - "docker-compose.test.yaml"
    - ".github/workflows/backed-go.yml"

  pull_request:
    branches: [ "main" ]
    paths:
    - "backend/admin/**"
    - "docker-compose.test.yaml"
    - ".github/workflows/backed-go.yml"

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          working-directory: backend/admin

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build
      run: cd backend/admin && go build -v ./...

    - name: Test
      run: docker compose -f docker-compose.test.yaml run --rm --build test

    - name: Build the Docker image
      run: docker build ./backend/admin --tag back-app
