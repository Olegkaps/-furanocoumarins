name: Frontend Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
    - "frontend/**"
    - ".github/workflows/frontend-docker-image.yml"

  pull_request:
    branches: [ "main" ]
    paths:
    - "frontend/**"
    - ".github/workflows/frontend-docker-image.yml"

jobs:

  lint:
    name: Lint (Oxlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oxc-project/oxlint-action@v2.0.1
        with:
          # Allow, Warn, or Deny specific lint rules or entire categories
          # https://oxc.rs/docs/guide/usage/linter/cli.html#allowing-denying-multiple-lints
          deny: |
            correctness
            no-eval
          warn: |
            suspicious
            perf
          # https://oxc.rs/docs/guide/usage/linter/cli.html#enable-plugins
          plugins: nextjs jest
          
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the Docker image
      run: echo "VITE_REACT_APP_BACKEND_SOURCE=${{ secrets.BACKEND_HOST }}" > frontend/.env && docker build ./frontend/ --tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:$GITHUB_SHA

    - name: Login to DockerHub
      run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:$GITHUB_SHA
