<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furanocumarins</title>
  </head>
  <body style="background: #f0f3f7; width: 100%;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script src="https://unpkg.com/smiles-drawer@1.0.10/dist/smiles-drawer.min.js"></script>
    <script>
      let options = Object();
      options.isomeric = true;
      options.width = 300
      options.height = 200
      let smilesDrawer = new SmilesDrawer.Drawer(options);

      const drawSMILES = function() {
        let elements = document.getElementsByClassName("smiles");

        for (let i = 0; i < elements.length; i++) {
          const el = elements[i];
          const smiles = el.getAttribute("data-smiles") || el.id.split("_")[0];
          if (!smiles) continue;
          SmilesDrawer.parse(smiles, (tree) => smilesDrawer.draw(tree, el.id, "light", false));
        }

        setTimeout(drawSMILES, 300)
      }

      drawSMILES()
    </script>
  </body>
</html>
