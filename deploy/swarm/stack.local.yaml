version: "3.8"

# Optional overlay for local/dev Swarm: adds MinIO for S3-compatible storage.
# Deploy: ./deploy/swarm/scripts/deploy.sh --local

services:
  minio:
    image: minio/minio:latest
    hostname: minio
    command: server /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - back
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
      restart_policy:
        condition: on-failure

  go-auth:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  minio_data:
