version: "3.8"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - back
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user) -d $$(cat /run/secrets/postgres_db)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 256M
      restart_policy:
        condition: on-failure

  redis:
    image: redis:latest
    hostname: redis
    secrets:
      - redis_password
    entrypoint: /bin/sh
    command: -c 'exec redis-server --requirepass "$$(cat /run/secrets/redis_password)"'
    volumes:
      - redis-data:/data
    networks:
      - back
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
      restart_policy:
        condition: on-failure

  cassandra:
    image: cassandra:3.11.9
    hostname: cassandra
    volumes:
      - cassandra3_data:/var/lib/cassandra
    networks:
      - back
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
      restart_policy:
        condition: on-failure

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    entrypoint: /bin/sh
    command: >-
      -c 'export DATA_SOURCE_NAME="postgresql://$$(cat /run/secrets/postgres_user):$$(cat /run/secrets/postgres_password)@postgres:5432/$$(cat /run/secrets/postgres_db)?sslmode=disable"
      && exec /bin/postgres_exporter'
    networks:
      - back
      - metrics
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    secrets:
      - redis_password
    entrypoint: /bin/sh
    command: >-
      -c 'export REDIS_ADDR=redis:6379
      && export REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"
      && exec /redis_exporter'
    networks:
      - back
      - metrics
    logging: *default-logging
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure

  cassandra-exporter:
    image: criteo/cassandra_exporter:latest
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "7199"
    networks:
      - back
      - metrics
    logging: *default-logging
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure

  node-exporter:
    image: prom/node-exporter:v1.7.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - metrics
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure

  go-auth:
    image: olegkaps/chem-admin:2.0.0
    secrets:
      - go_auth_env
    entrypoint: /bin/sh
    command: -c 'set -a && . /run/secrets/go_auth_env && set +a && exec ./main_app'
    networks:
      - back
      - metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/ping"]
      interval: 90s
      timeout: 30s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 128M
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/swarm/configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - metrics
      - ingress
    depends_on:
      go-auth:
        condition: service_healthy
      grafana:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    command:
      - -nginx.scrape-uri=http://nginx:8080/stub_status
    networks:
      - metrics
    logging: *default-logging
    depends_on:
      nginx:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    networks:
      - metrics
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana
    volumes:
      - ./monitoring/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./monitoring/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/dashboards/:/etc/grafana/provisioning/dashboards/:ro
      - grafanadata:/var/lib/grafana
    networks:
      - metrics
    depends_on:
      prometheus:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
      restart_policy:
        condition: on-failure

  loki:
    image: grafana/loki:2.9.0
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - metrics
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
      restart_policy:
        condition: on-failure

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    privileged: true
    networks:
      - metrics
    logging: *default-logging
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure

secrets:
  go_auth_env:
    external: true
  postgres_user:
    external: true
  postgres_password:
    external: true
  postgres_db:
    external: true
  redis_password:
    external: true

volumes:
  postgres_data:
  redis-data:
  cassandra3_data:
  grafanadata:
  prometheusdata:

networks:
  back:
    driver: overlay
  metrics:
    driver: overlay
  ingress:
    driver: overlay
