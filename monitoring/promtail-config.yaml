server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*log

    pipeline_stages:
      - json:
          expressions:
            stream: stream
            attrs: attrs
            tag: attrs.tag

      - regex:
          expression: (?P<image_name>(?:[^|]*[^|])).(?P<container_name>(?:[^|]*[^|])).(?P<image_id>(?:[^|]*[^|])).(?P<container_id>(?:[^|]*[^|]))
          source: "tag"

      - regex:
          expression: '(?P<service>postgres|redis|cassandra|go-auth|nginx|prometheus|grafana|loki|promtail|minio)'
          source: container_name

      - labels:
          tag:
          image_name:
          container_name:
          service:

  - job_name: host-syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: host-syslog
          host: vm
          __path__: /var/log/syslog

  - job_name: host-messages
    static_configs:
      - targets:
          - localhost
        labels:
          job: host-messages
          host: vm
          __path__: /var/log/messages
