global:
  scrape_interval: 15s

scrape_configs:
  - job_name: go-auth-fiber
    static_configs:
      - targets: ['go-auth:80']

  - job_name: go-auth-native
    static_configs:
      - targets: ['go-auth:5000']

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: cassandra
    static_configs:
      - targets: ['cassandra-exporter:8080']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: prometheus-self
    static_configs:
      - targets: ['localhost:9090']
