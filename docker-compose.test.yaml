# Backend test stack: unit + coverage gate + Postgres integration tests.
# Usage:
#   docker compose -f docker-compose.test.yaml run --rm --build test

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  test:
    image: furanocoumarins-admin-test:local
    build:
      context: ./backend/admin
      dockerfile: Dockerfile.test
    environment:
      ENV_TYPE: TEST
      RUN_INTEGRATION: "1"
      TEST_POSTGRES_DSN: "user=postgres password=postgres dbname=postgres host=postgres port=5432 sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
